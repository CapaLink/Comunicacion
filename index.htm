<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(120deg, #0f2027, #2c5364, #cfd9df);
    display: flex;
    flex-direction: column;
    color: white;
    overflow: hidden;
}

/* CURSOR GLOW */
.cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.08s linear;
    z-index: 1;
}

/* LOGO */
header {
    position: absolute;
    top: 25px;
    left: 30px;
    z-index: 2;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    opacity: 0.9;
}

/* CONTENEDOR CENTRAL */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
}

/* CARD VIDRIO */
.card {
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 50px;
    max-width: 600px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

    animation: fadeInUp 1.2s ease-out;
}

/* TITULO */
h1 {
    font-size: 42px;
    font-weight: 600;
    margin-bottom: 20px;
    animation: fadeIn 1.5s ease;
}

/* TEXTO */
p {
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 35px;
    animation: fadeIn 1.8s ease;
}

/* BOTON */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    background: rgba(255,255,255,0.9);
    color: #0f2027;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    display: inline-block;
}

.btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 25px rgba(255,255,255,0.25);
}

/* ANIMACIONES */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
        filter: blur(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .card {
        margin: 20px;
        padding: 30px;
    }

    h1 {
        font-size: 30px;
    }

    p {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<header>
    <div class="logo">MiLogo</div>
</header>

<div class="container">
    <div class="card">
        <h1>Aprendé a tu ritmo</h1>

        <p>
            Cursos diseñados para potenciar tu crecimiento.
            Contenido claro, moderno y enfocado en resultados reales.
        </p>

        #Ingresá al curso</a>
    </div>
</div>

<script>
const glow = document.getElementById("glow");

document.addEventListener("mousemove", (e) => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
