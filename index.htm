<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #6366f1);
    display: flex;
    flex-direction: column;
    color: white;
    overflow: hidden;
}

/* LOGO */
header {
    position: absolute;
    top: 25px;
    left: 30px;
    z-index: 2;
}

.logo {
    width: 170px; /* más grande */
    height: auto;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
}

/* CONTENEDOR CENTRAL */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD VIDRIO */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 26px;
    padding: 70px;
    max-width: 850px;
    width: 85%;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 25px 70px rgba(0,0,0,0.4);

    animation: fadeInUp 1.2s ease-out;
}

/* TITULO */
h1 {
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 25px;
}

/* TEXTO */
p {
    font-size: 20px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
}

/* BOTON */
.btn {
    padding: 15px 40px;
    border-radius: 35px;
    background: linear-gradient(120deg, #ffffff, #dbeafe); /* corregido */
    color: #1e3a8a;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;

    transition: all 0.35s ease;
}

/* HOVER */
.btn:hover {
    background: linear-gradient(120deg, #1e3a8a, #6366f1);
    color: white;

    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
}

/* ANIMACION */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
        filter: blur(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .card {
        margin: 20px;
        padding: 35px;
        max-width: 95%;
    }

    h1 {
        font-size: 32px;
    }

    p {
        font-size: 16px;
    }

    .logo {
        width: 130px;
    }
}

</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo" class="logo">
</header>

<div class="container">
    <div class="card">
        <h1>Comunicación</h1>

        <p>
            La comunicación es una herramienta fundamental en nuestra vida diaria.
        </p>

        <a href="comunicacion_para_ford" class="btn" target="_blank">Ingresá al curso</a>
    </div>
</div>

</body>
</html>
