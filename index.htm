<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(120deg, #0f2027, #2c5364, #cfd9df);
    display: flex;
    flex-direction: column;
    color: white;
    overflow: hidden;
}

/* LOGO */
header {
    position: absolute;
    top: 25px;
    left: 30px;
    z-index: 2;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    opacity: 0.9;
}

/* CONTENEDOR CENTRAL */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD VIDRIO (agrandada) */
.card {
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 70px;              /* más espacio interno */
    max-width: 850px;           /* más ancho */
    width: 85%;                 /* ocupa más pantalla */
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

    animation: fadeInUp 1.2s ease-out;
}

/* TITULO */
h1 {
    font-size: 46px;
    font-weight: 600;
    margin-bottom: 25px;
}

/* TEXTO */
p {
    font-size: 19px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
}

/* BOTON MEJORADO */
.btn {
    padding: 15px 35px;
    border-radius: 30px;
    background: linear-gradient(120deg, #ffffff, #051121);
    color: #0f2027;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;

    transition: all 0.35s ease;
}

/* cambio de color animado */
.btn:hover {
    background: linear-gradient(120deg, #60a5fa, #2563eb);
    color: white;

    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
}

/* ANIMACIONES */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
        filter: blur(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .card {
        margin: 20px;
        padding: 35px;
        max-width: 95%;
    }

    h1 {
        font-size: 32px;
    }

    p {
        font-size: 16px;
    }
}

</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo" class="logo">
</header>

<div class="container">
    <div class="card">
        <h1>Comunicación</h1>

        <p>
            La comunicación es una herramienta fundamental en nuestra vida diaria.

        </p>

        <a href="#" class="btn">Ingresá al curso</a>
    </div>
</div>

</body>
</html>
