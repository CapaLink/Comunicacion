<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(120deg, #0f2027, #2c5364, #cfd9df);
    display: flex;
    flex-direction: column;
    color: white;
    overflow: hidden;
}

/* CURSOR GLOW */
.cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.08s linear;
    z-index: 1;
}

/* LOGO */
header {
    position: absolute;
    top: 25px;
    left: 30px;
    z-index: 2;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    opacity: 0.9;
}

/* CONTENEDOR CENTRAL */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
}

/* CARD VIDRIO */
.card {
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 50px;
    max-width: 600px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

    animation: fadeInUp 1.2s ease-out;
}

/* TITULO */
h1 {
    font-size: 42px;
    font-weight: 600;
    margin-bottom: 20px;
    animation: fadeIn 1.5s ease;
}

/* TEXTO */
p {
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 35px;
    animation: fadeIn 1.8s ease;
}

/* BOTON */
.btn {
    
    padding: 14px 34px;
    border-radius: 30px;
    background: rgba(255,255,255,0.95);
    color: #0f2027;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    position: relative;
    overflow: hidden;

    transition: all 0.2s ease;

}


/* brillo dinámico */
.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transition: 0.6s;
}

.btn:hover::before {
    left: 100%;
}

/* hover */
.btn:hover {
    transform: scale(1.06);
    box-shadow: 0 15px 35px rgba(255,255,255,0.25);
}

/* click efecto */
.btn:active {
    transform: scale(0.96);

    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transition: 0.6s;
}

.btn:hover::before {
    left: 100%;
}

.btn:hover {
    transform: scale(1.06);
    box-shadow: 0 15px 35px rgba(255,255,255,0.25);
}

/* click efecto */
.btn:active {
    transform: scale(0.96);

/* ANIMACIONES */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
        filter: blur(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .card {
        margin: 20px;
        padding: 30px;
    }

    h1 {
        font-size: 30px;
    }

    p {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<header>
    <div class="logo">MiLogo</div>
</header>

<div class="container">
    <div class="card">
        <h1>Aprendé a tu ritmo</h1>

        <p>
            Cursos diseñados para potenciar tu crecimiento.
            Contenido claro, moderno y enfocado en resultados reales.
        </p>

<a href="#" class="btn" id="btn">Ingresá al curso</a>
    </div>
</div>

<script>

const btn = document.getElementById("btn");

// efecto magnético mejorado
btn.addEventListener("mousemove", (e) => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    btn.style.transform = `translate(${x * 0.25}px, ${y * 0.25}px) scale(1.06)`;
});

btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0,0) scale(1)";
});

// efecto ripple al hacer click
btn.addEventListener("click", function(e) {
    const circle = document.createElement("span");
    circle.classList.add("ripple");

    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);

    circle.style.width = circle.style.height = size + "px";
    circle.style.left = (e.clientX - rect.left - size / 2) + "px";
    circle.style.top = (e.clientY - rect.top - size / 2) + "px";

    btn.appendChild(circle);

    setTimeout(() => circle.remove(), 600);
});

</script>

</body>
</html>
